# Fly.io config — deploy with `fly launch` (first time) or `fly deploy` (subsequent).
# App name must be globally unique. Change `loren-video-intel` if Fly says it's taken.

app = "loren-video-intel"
primary_region = "iad"  # US East (Ashburn) — closest to FL

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8000
  force_https = true
  # Free tier: machine auto-stops after idle, auto-starts on request (~1s warm-up).
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"  # 512MB needed for yt-dlp + audio buffer. Drop to 256mb if usage is light.
  cpu_kind = "shared"
  cpus = 1
