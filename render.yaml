services:
  - type: web
    name: video-intel-backend
    runtime: python
    plan: starter
    region: oregon
    buildCommand: |
      apt-get update && apt-get install -y ffmpeg
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        value: https://vaerkevjrupxdbgrxfkk.supabase.co
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        value: https://video-intel.ai-loren.com
