services:
  - type: web
    name: video-intel-backend
    runtime: python
    # Free plan: sleeps after 15 min idle, ~30-60s cold start. $0/mo.
    # Upgrade to "starter" ($7/mo) for always-on if cold starts annoy you.
    plan: free
    region: oregon
    buildCommand: |
      apt-get update && apt-get install -y ffmpeg
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        value: https://vaerkevjrupxdbgrxfkk.supabase.co
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        value: https://video-intel.ai-loren.com
